syntax = "proto3";

service InternalBanking {
  rpc GetUserRecordsByCredentials (UserCredentialsRequest) returns (UserResponse) {}

  rpc GetAccountByUserId (GetAccountByUserIdRequest) returns (AccountResponse) {}

  // Transactions
  rpc GetTransactionsByAccountId (InternalTransactionsByAccountIdRequest) returns (InternalTransactionsResponse) {}
  rpc GetTransactionById (InternalTransactionRequest) returns (InternalTransactionsResponse) {}

  // Store Payment Intent as transaction
  rpc StorePaymentIntent (PaymentIntentRequest) returns (PaymentIntentResponse) {}

  // Log something
  rpc PostLog (LogRequest) returns (LogResponse) {}
}

// ---
// Requests
message UserCredentialsRequest {
  string username = 1;
  string password = 2;
}

message GetAccountByUserIdRequest {
  uint64 user_id = 1;
}

message InternalTransactionsByAccountIdRequest {
  uint64 id = 1;
}

message InternalTransactionRequest {
  uint64 id = 1;
}

message LogRequest {
  string kind = 1;
  string message = 2;
}

message PaymentIntentRequest {
  uint64 amount = 1;
  uint64 fees = 2;
  uint64 user_id = 3;
}

// ---
// Responses
message UserResponse {
  bool found = 1;
  optional User user = 2;
  optional Account account = 3;
  repeated uint64 transactions = 4;
}

message GetUserByIdResponse {
  optional User user = 1;
}

message AccountResponse {
  optional Account account = 1;
}

message InternalTransactionsResponse {
  repeated Transaction transactions = 1;
}

message LogResponse {
  bool success = 1;
  Log log = 2;
}

message PaymentIntentResponse {
  bool success = 1;
  optional Transaction transaction = 2;
}

// ---
// Models
message User {
  uint64 id = 1;
  string username = 2;
}

message Account {
  uint64 id = 1;
  int64 user_id = 2;
  int64 current_balance = 3;
  int64 available_balance = 4;
  uint64 updated_at = 5;
}

message Log {
  uint64 id = 1;
  uint64 timestamp = 2;
  string kind = 3;
  string message = 4;
}

message Transaction {
  uint64 id = 1;
  uint64 amount = 2;
  uint64 fee = 3;
  int64 source_account_id = 4;
  int64 recipient_account_id = 5;
  string status = 6;
  uint64 updated_at = 7;
  uint64 tries = 8;
}
