syntax = "proto3";

service InternalBanking {
  rpc GetUserByCredentials (UserByCredentialsRequest) returns (UserByCredentialsResponse) {}

  rpc GetAccountByUserId (AccountByUserIdRequest) returns (AccountByUserIdResponse) {}
  rpc AccountByIdExists (AccountByIdExistsRequest) returns (AccountByIdExistsResponse) {}

  // Transactions
  rpc GetAccountTransactionWithId (AccountTransactionRequest) returns (TransactionsResponse) {}

  // Store Payment Intent as transaction
  rpc StorePaymentIntent (PaymentIntentRequest) returns (PaymentIntentResponse) {}

  // Log something
  rpc PostLog (LogRequest) returns (LogResponse) {}
}

// ---
// Requests
message UserByCredentialsRequest {
  string username = 1;
  string password = 2;
}

message AccountByUserIdRequest {
  uint64 user_id = 1;
}

message AccountByIdExistsRequest {
  uint64 id = 1;
}

message AccountTransactionRequest {
  uint64 account_id = 1;
  uint64 transaction_id = 2;
}

message LogRequest {
  string kind = 1;
  string message = 2;
}

message PaymentIntentRequest {
  uint64 amount = 1;
  uint64 fees = 2;
  uint64 account_id = 3;
  uint64 recipient_account_id = 4;
  string message = 5;
}

// ---
// Responses
message UserByCredentialsResponse {
  bool found = 1;
  optional User user = 2;
  optional Account account = 3;
  repeated Transaction transactions = 4;
}

message GetUserByIdResponse {
  optional User user = 1;
}

message AccountByUserIdResponse {
  optional Account account = 1;
}

message AccountByIdExistsResponse {
    bool exists = 1;
}

message TransactionsResponse {
  repeated Transaction transactions = 1;
}

message LogResponse {
  bool success = 1;
  Log log = 2;
}

message PaymentIntentResponse {
  bool success = 1;
  optional Transaction transaction = 2;
}

// ---
// Models
message User {
  uint64 id = 1;
  string username = 2;
}

message Account {
  uint64 id = 1;
  int64 user_id = 2;
  int64 current_balance = 3;
  int64 available_balance = 4;
  uint64 updated_at = 5;
}

message Log {
  uint64 id = 1;
  uint64 timestamp = 2;
  string kind = 3;
  string message = 4;
}

message Transaction {
  uint64 id = 1;
  uint64 amount = 2;
  optional int64 source_account_id = 3;
  int64 recipient_account_id = 4;
  string message = 5;
  string status = 6;
  optional uint64 fees = 7;
  string kind = 8;
  uint64 timestamp = 9;
  uint64 updated_at = 10;
}
