syntax = "proto3";

service BankingApp {
  rpc Login (LoginRequest) returns (LoginResponse) {}

  rpc GetAccountDetailsByToken (PublicAccountDetailsRequest) returns (PublicAccountDetailsResponse) {}

  // Estimate Payment Intent
  rpc EvaluatePaymentIntent (PublicPaymentIntentRequest) returns (EvaluatePaymentIntentResponse) {}

  // Make Payment
  rpc PostPaymentIntent (PublicPostPaymentIntentRequest) returns (PublicPaymentIntentStoreResponse) {}
}

// ---
// Requests
message LoginRequest {
  string username = 1;
  string password = 2;
}

message PublicAccountDetailsRequest {
  string token = 1;
}

message PublicPaymentIntentRequest {
  string token = 1;
  uint64 recipient_account_id = 2;
  uint64 amount = 3;
}

message TransactionRequest {
  string token = 1;
  uint64 transaction_id = 2;
}

message TransactionsResponse {
  repeated PublicTransaction transactions = 1;
}

message PublicPostPaymentIntentRequest {
  string token = 1;
  uint64 amount = 2;
  uint64 recipient_account_id = 3;
  string message = 4;
}

// ---
// Response
message LoginResponse {
  string token = 1;
  optional PublicUser user = 2;
  optional uint64 user_id = 3;
  optional uint64 account_id = 4;
  bool success = 5;
}

message PublicAccountDetailsResponse {
  optional PublicAccountDetails account = 1;
}

message EvaluatePaymentIntentResponse {
  bool valid_payment_intent = 1;
  uint64 fees = 2;
}

message PublicPaymentIntentStoreResponse {
  PublicTransaction transaction = 1;
}

// ---
// Models
message PublicUser {
  uint64 id = 1;
  string username = 2;
}

message PublicAccountDetails {
  uint64 id = 1;
  int64 user_id = 2;
  int64 current_balance = 3;
  int64 available_balance = 4;
  uint64 updated_at = 5;
}

message PublicTransaction {
  uint64 id = 1;
  uint64 amount = 2;
  optional int64 source_account_id = 3;
  uint64 destination_account_id = 4;
  string message = 5;
  string status = 6;
  optional uint64 balance = 7;
  optional uint64 fees = 8;
  string kind = 9;
  uint64 timestamp = 10;
}
