syntax = "proto3";

service BankingApp {
  rpc Login (LoginRequest) returns (LoginResponse) {}

  rpc GetAccountDetailsByToken (AppAccountDetailsRequest) returns (AppAccountDetailsResponse) {}

  // Estimate Payment Intent
  rpc EvaluatePaymentIntent (AppPaymentIntentRequest) returns (EvaluatePaymentIntentResponse) {}

  // Make Payment
  rpc PostPaymentIntent (AppPostPaymentIntentRequest) returns (AppPaymentIntentStoreResponse) {}

  rpc GetTransactionById (AppTransactionRequest) returns (AppTransactionsResponse) {}
}

// ---
// Requests
message LoginRequest {
  string username = 1;
  string password = 2;
}

message AppAccountDetailsRequest {
  string token = 1;
}

message AppPaymentIntentRequest {
  string token = 1;
  uint64 recipient_account_id = 2;
  uint64 amount = 3;
}

message AppTransactionRequest {
  string token = 1;
  uint64 transaction_id = 2;
}

message AppPostPaymentIntentRequest {
  string token = 1;
  uint64 amount = 2;
  uint64 recipient_account_id = 3;
  string message = 4;
}

// ---
// Response
message LoginResponse {
  string token = 1;
  optional AppUser user = 2;
  optional uint64 user_id = 3;
  optional uint64 account_id = 4;
  bool success = 5;
}

message AppAccountDetailsResponse {
  optional AppAccountDetails account = 1;
}

message EvaluatePaymentIntentResponse {
  bool valid_payment_intent = 1;
  uint64 fees = 2;
}

message AppPaymentIntentStoreResponse {
  optional AppTransaction transaction = 1;
}

message AppTransactionsResponse {
  repeated AppTransaction transactions = 1;
}

// ---
// Models
message AppUser {
  uint64 id = 1;
  string username = 2;
}

message AppAccountDetails {
  uint64 id = 1;
  int64 user_id = 2;
  int64 current_balance = 3;
  int64 available_balance = 4;
  uint64 updated_at = 5;
}

message AppTransaction {
  uint64 id = 1;
  uint64 amount = 2;
  optional int64 source_account_id = 3;
  uint64 recipient_account_id = 4;
  string message = 5;
  string status = 6;
  optional uint64 fees = 7;
  string kind = 8;
  uint64 timestamp = 9;
  uint64 updated_at = 10;
}
